spring:
  application:
    name: chat-atendimento

  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://localhost:3307/chat_atendimento?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: chatuser
    password: chatpass
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379

