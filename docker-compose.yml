services:
  evolution-api:
    image: atendai/evolution-api:v1.8.7
    container_name: evolution-api
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - AUTHENTICATION_API_KEY=tx6cg14quocf1giq0badws
      - AUTHENTICATION_TYPE=apikey
    volumes:
      - evolution-instances:/evolution/instances
      - evolution-store:/evolution/store

volumes:
  evolution-instances:
  evolution-store: